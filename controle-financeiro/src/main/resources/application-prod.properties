# Perfil de PRODUÇÃO — ativado com a variável de ambiente SPRING_PROFILES_ACTIVE=prod.
# Pensado para hospedagem gratuita: back-end no Render + banco PostgreSQL no Neon
# (veja DEPLOY.md na raiz do projeto para o passo a passo completo).

# String de conexão do PostgreSQL. O Neon fornece algo como:
# postgresql://usuario:senha@ep-xxxx.us-east-2.aws.neon.tech/nome_do_banco?sslmode=require
# Aqui é preciso no formato JDBC, então normalmente fica:
# jdbc:postgresql://ep-xxxx.us-east-2.aws.neon.tech/nome_do_banco?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" cria/ajusta as tabelas automaticamente a partir das entidades — conveniente para
# um projeto pessoal/portfólio. Em um sistema com mais usuários e histórico de dados valendo
# mais, o ideal seria migrar para uma ferramenta de migrations versionadas (ex.: Flyway).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Envio de e-mail real ligado em produção (recuperação de senha).
app.mail.enabled=true
