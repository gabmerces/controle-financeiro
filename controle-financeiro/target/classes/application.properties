# Configuração do nome da aplicação
spring.application.name=controle-financeiro

# Perfil ativo: em branco/local usa este arquivo (MySQL, pensado pra rodar na sua máquina).
# Em produção, defina a variável de ambiente SPRING_PROFILES_ACTIVE=prod para usar
# application-prod.properties (PostgreSQL, pensado para hospedagem gratuita tipo Neon).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# Configuração da URL de conexão com o MySQL (com a correção da chave pública e criação automática do banco se não existir)
# Lidas de variáveis de ambiente, com valores padrão para desenvolvimento local (após o "os dois pontos").
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_financeiro?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# Credenciais de acesso ao banco de dados (NUNCA versionar senha real aqui — usar variáveis de ambiente)
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# Driver de conexão do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate / JPA
# update: Cria as tabelas automaticamente ou atualiza caso você crie novos Models/Entidades
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos SQL no terminal (ajuda muito a ver o Hibernate trabalhando)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuração do JWT (token de autenticação)
# jwt.secret: NUNCA use o valor padrão abaixo em produção — defina a variável de ambiente JWT_SECRET
# com uma string aleatória longa (32+ caracteres).
jwt.secret=${JWT_SECRET:chave-secreta-apenas-para-desenvolvimento-troque-em-producao}
# Tempo de expiração do token em milissegundos (padrão: 24 horas)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Domínios com permissão para chamar a API (CORS). Em produção, defina APP_ALLOWED_ORIGIN
# com a URL pública do seu site (ex.: https://seu-app.onrender.com). Vários domínios podem
# ser separados por vírgula. Em dev, já libera as portas comuns do localhost.
app.allowed-origins=${APP_ALLOWED_ORIGIN:http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500}

# URL pública base da aplicação, usada para montar o link de redefinição de senha no e-mail.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Envio de e-mail (recuperação de senha), via API HTTP da Brevo (não SMTP — veja EmailService
# para o porquê). Desligado por padrão em desenvolvimento local (os links aparecem no
# console/log em vez de serem enviados de verdade). Em produção, defina APP_MAIL_ENABLED=true
# e BREVO_API_KEY com a chave gerada em https://app.brevo.com/settings/keys/api
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@controle-financeiro.local}
app.mail.from-name=${MAIL_FROM_NAME:Controle Financeiro}
app.mail.brevo-api-key=${BREVO_API_KEY:}
